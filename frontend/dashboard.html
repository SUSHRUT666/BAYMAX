<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dashboard</title>

    <!-- CSS FILES -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700&family=Open+Sans&display=swap">
    <link href="css/bootstrap.min.css" rel="stylesheet">
    <link href="css/bootstrap-icons.css" rel="stylesheet">
    <link href="css/templatemo-topic-listing.css" rel="stylesheet">
</head>
<body class="topics-listing-page" id="top">

<main>
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="#">
                <i class="bi-back"></i>
                <span>Baymax</span>
            </a>

            <div class="d-lg-none ms-auto me-4">
                <a href="#top" class="navbar-icon bi-person smoothscroll"></a>
            </div>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-lg-5 me-lg-auto">
                    <li class="nav-item">
                        <a class="nav-link click-scroll" href="#">Home</a>
                    </li>
                </ul>

                <div class="d-none d-lg-block">
                    <a href="#top" class="navbar-icon bi-person smoothscroll"></a>
                </div>
            </div>
        </div>
    </nav>

    <header class="site-header d-flex flex-column justify-content-center align-items-center">
        <div class="container">
            <div class="row align-items-center">
                <h2 class="text-white">Explore</h2>
            </div>
        </div>
    </header>

    <section class="section-padding">
        <div class="container">
            <div class="row">
                <div class="col-lg-12 col-12 text-center">
                    <h3 class="mb-4">Our Features</h3>
                </div>

                <div class="col-lg-8 col-12 mt-3 mx-auto">
                    <div class="custom-block custom-block-topics-listing bg-white shadow-lg mb-5">
                        <div class="d-flex flex-column">
                            <img src="images/calorie.png" class="custom-block-image img-fluid mx-auto" alt="">

                            <div class="custom-block-topics-listing-info d-flex flex-column">
                                <h5 class="mb-2">Calories</h5>
                                <p class="mb-0">Enter the food you have consumed to get calorie details.</p>
                                <form onsubmit="handleCalorie(event)" id="foodForm">
                                    <input type="text" id="foodInput" name="food" placeholder="Enter food item" required>
                                    <button type="submit">Submit</button>
                                </form>
                            </div>

                            <div id="calorie_div"></div>
                        </div>
                    </div>

                    <div class="custom-block custom-block-topics-listing bg-white shadow-lg mb-5">
                        <div class="d-flex">
                            <img src="images/fitness.png" class="custom-block-image img-fluid" alt="">
                            <div class="custom-block-topics-listing-info d-flex">
                                <h5 class="mb-2">Workouts</h5>
                                <p class="mb-0">Enter your workout details.</p>
                                <form id="exeForm">
                                    <input type="text" id="exeInput" name="workout" placeholder="Workout">
                                    <input type="number" id="exeDurationInput" name="duration" placeholder="Duration in hours" step="0.5" min="0" value="0">
                                    <button type="submit">Submit</button>
                                </form>
                            </div>
                        </div>
                    </div>

                    <div class="custom-block custom-block-topics-listing bg-white shadow-lg mb-5">
                        <div class="d-flex">
                            <img src="images/med history.png" class="custom-block-image img-fluid" alt="">
                            <div class="custom-block-topics-listing-info d-flex">
                                <h5 class="mb-2">Medical History</h5>
                                <p class="mb-0">Enter your medical history and medications.</p>
                                <form id="medForm">
                                    <div id="inputContainer">
                                        <div class="input-group">
                                            <input type="text" name="complications" placeholder="Complications" required>
                                            <button type="button" onclick="addInput()">+</button>
                                        </div>
                                    </div>
                                    <br>
                                    <div id="medicationsContainer">
                                        <div class="input-group">
                                            <input type="text" name="medicines" placeholder="Medicines" required>
                                            <button type="button" onclick="addInput()">+</button>
                                        </div>
                                    </div>
                                    <br>
                                    <button type="submit">Submit</button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer class="site-footer section-padding">
        <div class="container">
            <div class="row">
                <div class="col-lg-3 col-12 mb-4 pb-2">
                    <a class="navbar-brand mb-2" href="#">
                        <i class="bi-back"></i>
                        <span>Baymax</span>
                    </a>
                </div>

                <div class="col-lg-3 col-md-4 col-6">
                    <h6 class="site-footer-title mb-3">Resources</h6>
                    <ul class="site-footer-links">
                        <li class="site-footer-link-item">
                            <a href="#" class="site-footer-link">Home</a>
                        </li>
                    </ul>
                </div>

                <div class="col-lg-3 col-md-4 col-6 mb-4 mb-lg-0">
                    <h6 class="site-footer-title mb-3">Information</h6>
                    <p class="text-white d-flex mb-1">
                        <a href="tel:123-456-7890" class="site-footer-link">123-456-7890</a>
                    </p>
                    <p class="text-white d-flex">
                        <a href="mailto:baymax@company.com" class="site-footer-link">baymax@company.com</a>
                    </p>
                </div>

                <div class="col-lg-3 col-md-4 col-12 mt-4 mt-lg-0 ms-auto">
                    <!-- Dropdown or additional footer content here -->
                </div>
            </div>
        </div>
    </footer>

    <!-- JavaScript Files -->
    <script src="js/jquery.min.js"></script>
    <script src="js/bootstrap.bundle.min.js"></script>
    <script>
        // JavaScript functions and event handlers
        // Define handleCalorie, addInput, and other functions as needed
    </script>
</main>

</body>
</html>
